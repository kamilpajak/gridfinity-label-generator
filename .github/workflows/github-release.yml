name: GitHub Release

on:
  push:
    tags:
      - 'v*'  # Trigger on any tag starting with 'v'

# Add permissions to the GITHUB_TOKEN
permissions:
  contents: write  # Gives permission to create releases
  packages: read   # Optional: if you need to access GitHub packages

jobs:
  create_release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0  # Fetch all history and tags
      
      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV
      
      - name: Extract Changelog
        id: extract_changelog
        run: |
          # Extract the latest version's changelog
          version="${GITHUB_REF#refs/tags/}"
          echo "Extracting changelog for version: $version"
          
          # Get the content between this version and the next version header
          changelog=$(awk -v ver="$version" '
            /^## \[?'"$version"'\]?/ { flag=1; next }
            /^## / && flag { exit }
            flag { print }
          ' CHANGELOG.md)
          
          # Save to file for the release body
          echo "$changelog" > release_body.md
          echo "Extracted changelog content"
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body_path: release_body.md
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Debug - Release created
        run: |
          echo "Created GitHub Release for tag: ${{ github.ref_name }}"
          echo "Version: ${{ env.VERSION }}"
          echo "Release URL: https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}"

  verify_release:
    needs: create_release
    runs-on: ubuntu-latest
    steps:
      - name: Verify GitHub Release
        run: |
          echo "Verifying release for tag: ${{ github.ref_name }}"
          # Wait for GitHub API to register the release
          echo "Waiting 60 seconds for GitHub API to register the release..."
          sleep 60
          
          RELEASE_URL="https://api.github.com/repos/${{ github.repository }}/releases/tags/${{ github.ref_name }}"
          echo "Checking release at: $RELEASE_URL"
          
          # Try multiple times with exponential backoff
          for i in {1..3}; do
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" $RELEASE_URL)
            echo "Attempt $i: HTTP status $HTTP_STATUS"
            
            if [[ $HTTP_STATUS == "200" ]]; then
              echo "✅ GitHub Release verified successfully!"
              exit 0
            fi
            
            if [[ $i -lt 3 ]]; then
              wait_time=$((30 * i))
              echo "Waiting $wait_time seconds before retry..."
              sleep $wait_time
            fi
          done
          
          echo "❌ GitHub Release verification failed after 3 attempts"
          echo "Final status: $HTTP_STATUS"
          echo "This might be a timing issue. The release may still be created successfully."
          # Don't fail the workflow for verification issues
          exit 0
      
      - name: Notify about successful release
        run: |
          echo "🎉 GitHub Release process completed successfully!"
          echo "Tag: ${{ github.ref_name }}"
          echo "Release URL: https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}"
          # Add notification logic here (e.g., Slack, email, etc.)
