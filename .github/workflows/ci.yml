name: CI

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read
  security-events: write

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
        with:
          fetch-depth: 0 # Full history for commitlint validation

      - uses: pnpm/action-setup@a3252b78c470c02df07e9d59298aecedc3ccdd6d # v3
        with:
          version: 10

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22 # Current LTS (Iron)
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      # Install Playwright browsers (needed for both unit tests and E2E)
      - name: Install Playwright
        run: pnpm exec playwright install --with-deps chromium

      # BLOCKING: Quality gates (fail-fast)
      - name: Type check
        run: pnpm check

      - name: Lint
        run: pnpm lint

      - name: Check changelog
        run: pnpm check-changelog

      - name: Validate commit messages
        if: github.event_name == 'pull_request'
        run: |
          # Validate commits in PR follow conventional format and don't have forbidden words
          pnpm commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose

      - name: Unit tests
        run: pnpm test:unit --run

      - name: Build and validate standards
        run: pnpm build-standards

      - name: Validate images
        run: pnpm validate-images

      - name: Build application
        run: pnpm build

      # INFORMATIONAL: E2E tests

      - name: E2E tests
        run: pnpm test:e2e
        continue-on-error: true

      - name: Upload E2E results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  security:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4

      - uses: pnpm/action-setup@a3252b78c470c02df07e9d59298aecedc3ccdd6d # v3
        with:
          version: 10

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      # INFORMATIONAL: Dependency audit
      - name: Security audit
        run: pnpm audit --prod
        continue-on-error: true

      # BLOCKING: Secret scanning
      - name: Scan for secrets
        uses: trufflesecurity/trufflehog@682eda677ac970a4d88b82d3cf2a4c681a5a1bd0 # main
        with:
          path: ./
          extra_args: --only-verified

  sonar:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
        with:
          fetch-depth: 0 # Full history for accurate blame information

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@0303985b160cc10d0eb33bac43a94eed7bad379a # v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  docker-security:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4

      - name: Check if Dockerfile exists
        id: dockerfile-check
        run: |
          if [ -f "Dockerfile" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Build Docker image
        if: steps.dockerfile-check.outputs.exists == 'true'
        run: docker build -t gridscribe:test .

      - name: Run Trivy vulnerability scanner
        if: steps.dockerfile-check.outputs.exists == 'true'
        uses: aquasecurity/trivy-action@b6643a29fecd7f34b3597bc6acb0a98b03d33ff8 # master
        with:
          image-ref: 'gridscribe:test'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results to GitHub Security
        if: steps.dockerfile-check.outputs.exists == 'true' && always()
        uses: github/codeql-action/upload-sarif@64d10c13136e1c5bce3e5fbde8d4906eeaafc885 # v3
        continue-on-error: true
        with:
          sarif_file: 'trivy-results.sarif'
