# Approve postinstall build scripts for these dependencies (pnpm 11 blocks
# unapproved build scripts by default). esbuild and sharp ship native binaries.
allowBuilds:
  esbuild: true
  sharp: true
minimumReleaseAgeExclude:
  - '@typescript-eslint/eslint-plugin@8.63.0'
  - '@typescript-eslint/parser@8.63.0'
  - '@typescript-eslint/project-service@8.63.0'
  - '@typescript-eslint/scope-manager@8.63.0'
  - '@typescript-eslint/tsconfig-utils@8.63.0'
  - '@typescript-eslint/type-utils@8.63.0'
  - '@typescript-eslint/types@8.63.0'
  - '@typescript-eslint/typescript-estree@8.63.0'
  - '@typescript-eslint/utils@8.63.0'
  - '@typescript-eslint/visitor-keys@8.63.0'
  - typescript-eslint@8.63.0
# Force patched versions of transitive dev-tooling packages flagged by Dependabot.
# All are backward-compatible patches within the same major; per-major keys avoid
# forcing a cross-major bump onto parents that need the older line.
overrides:
  'ajv@6': '^6.14.0'
  'ajv@8': '^8.18.0'
  'brace-expansion@1': '^1.1.13'
  'brace-expansion@2': '^2.0.3'
  'cookie': '^0.7.0'
  'fast-uri': '^3.1.2'
  'flatted': '^3.4.2'
  'js-yaml@4': '^4.1.2'
  'minimatch@3': '^3.1.4'
  'minimatch@9': '^9.0.7'
  'picomatch@2': '^2.3.2'
  'postcss': '^8.5.10'
  'ws@8': '^8.21.0'
  'yaml@1': '^1.10.3'
  'yaml@2': '^2.8.3'
