name: GitHub Release

on:
  push:
    tags:
      - 'v*'  # Trigger on any tag starting with 'v'

# Add permissions to the GITHUB_TOKEN
permissions:
  contents: write  # Gives permission to create releases
  packages: read   # Optional: if you need to access GitHub packages

jobs:
  create_release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0  # Fetch all history and tags
      
      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV
      
      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          body_path: CHANGELOG.md
          draft: false
          prerelease: false
      
      - name: Debug - Release created
        run: |
          echo "Created GitHub Release for tag: ${{ github.ref_name }}"
          echo "Version: ${{ env.VERSION }}"
          echo "Release URL: https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}"

  verify_release:
    needs: create_release
    runs-on: ubuntu-latest
    steps:
      - name: Verify GitHub Release
        run: |
          echo "Verifying release for tag: ${{ github.ref_name }}"
          # Wait for GitHub API to register the release
          sleep 30
          RELEASE_URL="https://api.github.com/repos/${{ github.repository }}/releases/tags/${{ github.ref_name }}"
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" $RELEASE_URL)
          if [[ $HTTP_STATUS == "200" ]]; then
            echo "✅ GitHub Release verified successfully!"
          else
            echo "❌ GitHub Release verification failed with status: $HTTP_STATUS"
            exit 1
          fi
      
      - name: Notify about successful release
        run: |
          echo "🎉 GitHub Release process completed successfully!"
          echo "Tag: ${{ github.ref_name }}"
          echo "Release URL: https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}"
          # Add notification logic here (e.g., Slack, email, etc.)
