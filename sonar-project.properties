# SonarCloud Configuration

# Project identification
sonar.projectKey=kamilpajak_gridfinity-label-generator
sonar.organization=kamilpajak

# Project metadata
sonar.projectName=gridfinity-label-generator
sonar.projectVersion=1.0

# Source paths
sonar.sources=src
sonar.tests=e2e,src
sonar.test.inclusions=**/*.test.ts,**/*.spec.ts,e2e/**/*.ts

# Exclusions
sonar.exclusions=**/node_modules/**,**/*.config.js,**/*.config.ts,build/**,dist/**,.svelte-kit/**
sonar.test.exclusions=src/**/*.svelte

# Exclude generated files from duplication detection
# Pattern follows official SonarCloud documentation examples
sonar.cpd.exclusions=**/*-generated.ts, **/*.generated.ts

# TypeScript/JavaScript specific
sonar.typescript.lcov.reportPaths=coverage/lcov.info
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Quality Gate - wait for result
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300

# Coverage (optional - if you have it)
# sonar.coverage.exclusions=**/*.test.ts,**/*.spec.ts
