# SonarCloud Configuration

# Project identification
sonar.projectKey=kamilpajak_gridfinity-label-generator
sonar.organization=kamilpajak

# Project metadata
sonar.projectName=gridfinity-label-generator
# Version is automatically detected from git tags

# Source paths
sonar.sources=src,e2e
sonar.tests=e2e
sonar.test.inclusions=**/*.test.ts,**/*.spec.ts,e2e/**/*.ts

# Exclusions from main analysis
sonar.exclusions=**/node_modules/**,**/*.config.js,**/*.config.ts,build/**,dist/**,.svelte-kit/**,src/app.html,src/app.css,src/lib/data/standards-generated.ts,src/routes/dev/**,src/routes/e2e/**,src/lib/components/ui/*/index.ts

# Exclude generated/data files and content-heavy UI components from duplication detection
# See docs/adr/001-sonarcloud-duplication-exclusions.md for rationale
sonar.cpd.exclusions=**/*-generated.ts,**/*.generated.ts,**/thread-pitch.ts,**/whats-new/**/*.svelte,**/legal/**/*.svelte,**/shared/modal-wrapper.svelte,**/affiliate-products.ts

# TypeScript/JavaScript specific
sonar.typescript.lcov.reportPaths=coverage/lcov.info
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Coverage exclusions (don't measure coverage OF test files)
sonar.coverage.exclusions=**/*.test.ts,**/*.spec.ts,e2e/**/*.ts

# Quality Gate - wait for result
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300
