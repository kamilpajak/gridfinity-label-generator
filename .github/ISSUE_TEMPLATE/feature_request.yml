name: Feature request
description: Suggest an idea or improvement for the Gridfinity Label Generator
title: '[Feature]: '
labels: ['enhancement']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to suggest a feature!

        Before you start, please [search existing issues](https://github.com/kamilpajak/gridfinity-label-generator/issues?q=is%3Aissue) to check whether your idea has already been proposed.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve? Describe the frustration or limitation you are running into.
      placeholder: I'm always frustrated when [...]
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe what you would like to happen. Be as specific as you can.
      placeholder: I would like to be able to [...]
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe any alternative solutions or workarounds you have considered.
      placeholder: I also thought about [...]
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add any other context, mockups, or screenshots about the feature request here.
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues to make sure this is not a duplicate.
          required: true
