version: 2
updates:
  # JavaScript/TypeScript dependencies (npm ecosystem also handles pnpm lockfiles)
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '06:00'
      timezone: 'Europe/Warsaw'
    open-pull-requests-limit: 10
    labels:
      - 'dependencies'
    commit-message:
      prefix: 'chore'
      include: 'scope'
    # Only propose versions old enough to clear the pnpm minimumReleaseAge
    # supply-chain gate, with longer waits for riskier bumps so the ecosystem
    # can surface breakage and peer deps can catch up. Security updates bypass
    # cooldown automatically.
    cooldown:
      default-days: 7
      semver-major-days: 14
      semver-minor-days: 7
      semver-patch-days: 3
    groups:
      npm-minor-and-patch:
        applies-to: version-updates
        update-types:
          - 'minor'
          - 'patch'

  # GitHub Actions used in workflows
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '06:00'
      timezone: 'Europe/Warsaw'
    open-pull-requests-limit: 5
    labels:
      - 'dependencies'
      - 'github-actions'
    commit-message:
      prefix: 'ci'
      include: 'scope'
    cooldown:
      default-days: 7
      semver-major-days: 14
    groups:
      actions-minor-and-patch:
        applies-to: version-updates
        update-types:
          - 'minor'
          - 'patch'

  - package-ecosystem: 'docker'
    directory: '/'
    schedule:
      interval: 'weekly'
    cooldown:
      default-days: 7
      semver-major-days: 14
