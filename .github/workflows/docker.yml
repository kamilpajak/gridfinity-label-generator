name: Build and Push Docker Image

on:
  push:
    tags:
      - 'v*'

# Add permissions to the GITHUB_TOKEN
permissions:
  contents: read
  packages: write  # Needed for pushing to GitHub Container Registry

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Extract version from tag
        id: tag
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV
      - name: Get current date
        id: date
        run: echo "BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_ENV
      - name: Get commit SHA
        id: sha
        run: echo "COMMIT_SHA=${GITHUB_SHA}" >> $GITHUB_ENV
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          build-args: |
            VERSION=${{ env.VERSION }}
            BUILD_DATE=${{ env.BUILD_DATE }}
            COMMIT_SHA=${{ env.COMMIT_SHA }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/gridfinity-label-generator:latest
            ghcr.io/${{ github.repository_owner }}/gridfinity-label-generator:${{ env.VERSION }}
            kamilpajak/storage-label-maker:latest
            kamilpajak/storage-label-maker:${{ env.VERSION }}
