name: Release

on:
  push:
    branches: [ master ]

# Add permissions to the GITHUB_TOKEN
permissions:
  contents: write  # Gives permission to push commits and create releases
  packages: read   # Optional: if you need to access GitHub packages

jobs:
  release:
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.message, 'chore(release)') }}
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Git config
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
      - name: Bump version
        id: version
        run: |
          npm run release
          echo "tag=$(git describe --tags --abbrev=0)" >> $GITHUB_OUTPUT
      - name: Push changes
        run: |
          git push origin HEAD:${{ github.ref }}
          git push origin --tags
      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          release_name: Release ${{ steps.version.outputs.tag }}
          body_path: CHANGELOG.md
          draft: false
          prerelease: false

      - name: Debug - Check tag
        run: |
          echo "Created and pushed tag: ${{ steps.version.outputs.tag }}"
          echo "This should trigger the Docker workflow automatically"
