name: Version Bump

on:
  push:
    branches: [master]
  # Add manual trigger option
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Version type (patch, minor, major, or auto)'
        required: true
        default: 'auto'
        type: choice
        options:
          - auto
          - patch
          - minor
          - major

# Add permissions to the GITHUB_TOKEN
permissions:
  contents: write # Gives permission to push commits and create tags
  packages: read # Optional: if you need to access GitHub packages

jobs:
  bump_version:
    runs-on: ubuntu-latest
    # Skip this job if the commit message contains "chore(release)" to prevent infinite loops
    if: ${{ (github.event_name == 'workflow_dispatch') || (!contains(github.event.head_commit.message, 'chore(release)')) }}
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          # IMPORTANT: You need to create a PAT with repo permissions
          # Go to Settings > Developer settings > Personal access tokens
          # Create a PAT with 'repo' scope
          # Add it as secret RELEASE_TOKEN in your repository
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Git config
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: Bump version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ "${{ github.event.inputs.version_type }}" == "auto" ]]; then
              npm run release
            else
              npm run release:${{ github.event.inputs.version_type }}
            fi
          else
            npm run release
          fi
          echo "tag=$(git describe --tags --abbrev=0)" >> $GITHUB_OUTPUT

      - name: Wait for CI checks
        uses: lewagon/wait-on-check-action@v1.3.1
        with:
          ref: ${{ github.sha }}
          check-name: validate
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 10

      - name: Push changes
        run: |
          # Push the commit (updated package.json and CHANGELOG.md)
          git push origin HEAD:master
          # Push the tags
          git push origin --tags

      - name: Debug - Check tag
        run: |
          echo "Created and pushed tag: ${{ steps.version.outputs.tag }}"
          echo "This will trigger the GitHub Release workflow automatically"