name: Analyze Failures

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]

permissions:
  contents: read
  actions: read

jobs:
  analyze:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    steps:
      - uses: kamilpajak/heisenberg@v0.3.1
        with:
          google-api-key: ${{ secrets.GOOGLE_API_KEY }}
          run-id: ${{ github.event.workflow_run.id }}
