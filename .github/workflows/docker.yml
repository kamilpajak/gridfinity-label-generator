name: Build and Push Docker Image

on:
  push:
    tags:
      - 'v*'
  # Allow manual triggering
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g., v0.1.3)'
        required: true
        default: 'latest'
  # Run after Release workflow completes
  workflow_run:
    workflows: ["Release"]
    types:
      - completed
    branches:
      - master

# Add permissions to the GITHUB_TOKEN
permissions:
  contents: read
  packages: write  # Needed for pushing to GitHub Container Registry

jobs:
  docker:
    runs-on: ubuntu-latest
    # Only run if triggered by workflow_run and the workflow was successful
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Debug - Trigger information
        run: |
          echo "Event name: ${{ github.event_name }}"
          echo "Full ref: $GITHUB_REF"
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "Triggered by tag: ${GITHUB_REF#refs/tags/}"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "Triggered manually with tag: ${{ github.event.inputs.tag }}"
          elif [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            echo "Triggered by workflow_run after Release workflow"
          fi
      
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # Fetch all history and tags
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Extract version from tag
        id: tag
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            # Triggered by tag push
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            # Triggered manually
            echo "VERSION=${{ github.event.inputs.tag }}" >> $GITHUB_ENV
            # Remove 'v' prefix if present
            if [[ "${{ github.event.inputs.tag }}" == v* ]]; then
              echo "VERSION=${VERSION#v}" >> $GITHUB_ENV
            fi
          elif [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            # Triggered by workflow_run
            # Get the latest tag
            git fetch --tags
            LATEST_TAG=$(git describe --tags --abbrev=0)
            echo "VERSION=${LATEST_TAG#v}" >> $GITHUB_ENV
          else
            # Fallback
            echo "VERSION=latest" >> $GITHUB_ENV
          fi
          echo "Using version: $VERSION"
      - name: Get current date
        id: date
        run: echo "BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_ENV
      - name: Get commit SHA
        id: sha
        run: echo "COMMIT_SHA=${GITHUB_SHA}" >> $GITHUB_ENV
      
      - name: Debug - Print build arguments
        run: |
          echo "VERSION: ${{ env.VERSION }}"
          echo "BUILD_DATE: ${{ env.BUILD_DATE }}"
          echo "COMMIT_SHA: ${{ env.COMMIT_SHA }}"
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          build-args: |
            VERSION=${{ env.VERSION }}
            BUILD_DATE=${{ env.BUILD_DATE }}
            COMMIT_SHA=${{ env.COMMIT_SHA }}
          # Ensure build arguments are properly passed
          tags: |
            ghcr.io/${{ github.repository_owner }}/gridfinity-label-generator:latest
            ghcr.io/${{ github.repository_owner }}/gridfinity-label-generator:${{ env.VERSION }}
            kamilpajak/storage-label-maker:latest
            kamilpajak/storage-label-maker:${{ env.VERSION }}
